                                : 'bg-white/60'
                            }
                        "

            updateBanner();
        }

        function updateBanner(){

            const slider =
                document.getElementById('banner-slider');

            slider.style.transform =
                `translateX(-${currentBanner * 100}%)`;

            renderDots();
        }

        function renderDots(){

            const dots =
                document.querySelectorAll('#banner-dots button');

            dots.forEach((dot,index)=>{

                dot.className =
                    `w-3 h-3 rounded-full transition-all ${
                        index === currentBanner
                        ? 'bg-yellow-400 scale-125'
                        : 'bg-white/60'
                    }`;

            });
        }

        function goToBanner(index){

            currentBanner = index;

            updateBanner();
        }

        setInterval(()=>{

            currentBanner++;

            if(currentBanner >= featuredProducts.length){

                currentBanner = 0;
            }

            updateBanner();

        },4000);

                                        "
                                        style="width:${Math.min(product.stock,100)}%"

        // TOGGLE SPECS
        function toggleSpecs(id){

            const el =
                document.getElementById(`specs-${id}`);

            el.classList.toggle('hidden');
        }

        // FILTRO
        function filterProducts(){

            const search =
                document.getElementById('search-input')
                .value
                .toLowerCase();

            const category =
                document.getElementById('category-filter')
                .value;

            const stockFilter =
                document.getElementById('stock-filter')
                .value;

            const filtered =
                products.filter(product => {

                    const searchMatch =
                        product.name.toLowerCase().includes(search);

                    const categoryMatch =
                        category === 'Todos'
                        || product.category === category;

                    let stockMatch = true;

                    if(stockFilter === 'available'){

                        stockMatch = product.stock > 0;
                    }

                    if(stockFilter === 'low'){

                        stockMatch =
                            product.stock > 0
                            && product.stock <= 5;
                    }

                    return (
                        searchMatch
                        && categoryMatch
                        && stockMatch
                    );
                });

            renderProducts(filtered);
        }

        // RESET
        function resetFilters(){

            document.getElementById('search-input').value = '';

            document.getElementById('category-filter').value = 'Todos';

            document.getElementById('stock-filter').value = 'all';

            renderProducts();
        }

        // ADD CART
        function addToCart(id){

            const product =
                products.find(p => p.id === id);

            if(product.stock <= 0){

                return;
            }

            product.stock--;

            const existing =
                cart.find(item => item.id === id);

            if(existing){

                existing.qty++;

            }else{

                cart.push({
                    ...product,
                    qty:1
                });
            }

            saveCart();

            renderProducts();

            updateCartUI();
        }

        // REMOVE
        function removeFromCart(id){

            const item =
                cart.find(i => i.id === id);

            if(!item){

                return;
            }

            const product =
                products.find(p => p.id === id);

            product.stock++;

            if(item.qty > 1){

                item.qty--;

            }else{

                cart =
                    cart.filter(i => i.id !== id);
            }

            saveCart();

            renderProducts();

            updateCartUI();
        }

        // UPDATE CART
        function updateCartUI(){

            const cartItems =
                document.getElementById('cart-items');

            const total =
                cart.reduce((sum,item)=>
                    sum + (item.price * item.qty)
                ,0);

            const count =
                cart.reduce((sum,item)=>
                    sum + item.qty
                ,0);

            document.getElementById('cart-count').innerText = count;

            document.getElementById('cart-total').innerText =
                `${total.toLocaleString()} Kz`;

            document.getElementById('bottom-total').innerText =
                `Ver Carrinho • ${total.toLocaleString()} Kz`;

            if(cart.length === 0){

                cartItems.innerHTML = `

                    <div class="text-center text-gray-400 py-20">

                        Carrinho vazio

                    </div>

                `;

                return;
            }

            cartItems.innerHTML =
                cart.map(item => `

                    <div class="flex gap-3 border rounded-2xl p-3">

                        <img
                            src="${item.image}"
                            class="w-20 h-20 rounded-xl object-cover"
                        />

                        <div class="flex-1">

                            <h4 class="font-black text-sm">
                                ${item.name}
                            </h4>

                            <p class="text-xs text-gray-500 mb-2">
                                ${item.qty}x
                            </p>

                            <div class="font-black">
                                ${(item.price * item.qty).toLocaleString()} Kz
                            </div>

                        </div>

                        <button
                            onclick="removeFromCart(${item.id})"
                            class="text-red-600 font-black text-xl"
                        >
                            ×
                        </button>

                    </div>

                `).join('');
        }

        // TOGGLE CART
        function toggleCart(){

            const cart =
                document.getElementById('cart-sidebar');

            const overlay =
                document.getElementById('overlay');

            if(cart.style.right === '0px'){

                cart.style.right = '-420px';

                overlay.classList.add('hidden');

            }else{

                cart.style.right = '0px';

                overlay.classList.remove('hidden');
            }
        }

        // SAVE
        function saveCart(){

            localStorage.setItem(
                'kamba-cart',
                JSON.stringify(cart)
            );
        }

        // WHATSAPP
        function sendWhatsApp(){

            if(cart.length === 0){

                alert('Carrinho vazio');

                return;
            }

            const total =
                cart.reduce((sum,item)=>
                    sum + (item.price * item.qty)
                ,0);

            let message =
                `*NOVO PEDIDO - KAMBA DA OBRA*%0A`;

            message +=
                `------------------------%0A`;

            cart.forEach(item => {

                message +=
                    `• ${item.qty}x ${item.name}%0A`;

            });

            message +=
                `------------------------%0A`;

            message +=
                `*TOTAL:* ${total.toLocaleString()} Kz%0A%0A`;

            message +=
                `_Tudo para tua obra é com o Kamba da Obra._`;

            window.open(
                `https://wa.me/${MY_PHONE}?text=${message}`,
                '_blank'
            );
        }

        // SCROLL
        function scrollToProducts(){

            document
                .getElementById('product-grid')
                .scrollIntoView({
                    behavior:'smooth'
                });
        }

        // INIT
        renderBanner();

        renderProducts();

        updateCartUI();

    </script>

</body>
</html>
