<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamba da Obra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-40">

    <header class="sticky top-0 z-50 bg-yellow-500 shadow-lg">
        <div class="max-w-7xl mx-auto px-3 py-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <h1 class="text-xs font-black text-gray-900">KAMBA DA OBRA</h1>
            </div>
            <button onclick="toggleCart()" class="relative p-1">
                <span id="cart-count" class="absolute -top-0 -right-0 bg-red-600 text-white text-[9px] font-black h-4 w-4 flex items-center justify-center rounded-full">0</span>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            </button>
        </div>
    </header>

    <main id="product-grid" class="max-w-7xl mx-auto p-4 grid grid-cols-2 gap-4"></main>

    <section id="checkout-section" class="max-w-md mx-auto p-6 bg-white rounded-2xl shadow-sm border border-gray-100 mt-10">
        <h2 class="text-xl font-black uppercase mb-6">Finalizar Pedido</h2>
        <div class="space-y-4">
            <input type="text" id="nome" placeholder="Nome Completo" class="w-full p-3 bg-gray-50 rounded-xl">
            <input type="text" id="nif" placeholder="NIF" class="w-full p-3 bg-gray-50 rounded-xl">
            <input type="text" id="local" placeholder="Zona de Entrega" class="w-full p-3 bg-gray-50 rounded-xl">
            <button onclick="gerarPDF()" class="w-full bg-yellow-500 py-4 rounded-xl font-black">GERAR NOTA E ENVIAR</button>
        </div>
    </section>

    <script>
        // 1. DADOS E CARRINHO
        let cart = JSON.parse(localStorage.getItem('kamba-cart')) || [];
        const products = [ /* ... teus produtos aqui ... */ ];

        // 2. FUNÇÕES BASE
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('right-0'); }
        function saveCart() { localStorage.setItem('kamba-cart', JSON.stringify(cart)); }

        // 3. GERAR PDF
        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const nome = document.getElementById('nome').value;
            doc.text("NOTA DE ENCOMENDA - KAMBA DA OBRA", 20, 20);
            doc.text("Cliente: " + nome, 20, 30);
            // ... (adiciona o resto dos campos)
            
            doc.save("Nota_Encomenda.pdf");
            
            // Enviar WhatsApp
            const msg = `Olá, fiz uma encomenda. Nome: ${nome}`;
            window.open(`https://wa.me/924433318?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Inicialização
        function init() {
            // Renderiza produtos e estado do carrinho
            console.log("Sistema Kamba Online");
        }
        init();
    </script>
</body>
</html>
